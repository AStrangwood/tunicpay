name: "Terraform CI/CD"

on:
  pull_request:
    branches: [main]
    paths:
      - "gcp/**"
      - "modules/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [main]
    paths:
      - "gcp/**"
      - "modules/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: "1.7.5"

# ────────────────────────────────────────────────────────────────
# This workflow covers the full lifecycle:
#   PR   → fmt, validate, lint, security scans, plan
#   Merge → apply (production only, behind environment protection)
# ────────────────────────────────────────────────────────────────

jobs:
  # ── Stage 1: Fast-fail on formatting & syntax ──────────────
  fmt-validate:
    name: "Format & Validate"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [development, production]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive -diff

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: gcp/${{ matrix.environment }}

      - name: Terraform validate
        run: terraform validate
        working-directory: gcp/${{ matrix.environment }}

  # ── Stage 2: Lint with TFLint + GCP ruleset ────────────────
  tflint:
    name: "TFLint"
    runs-on: ubuntu-latest
    needs: fmt-validate
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.3

      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint --recursive --format compact

  # ── Stage 3: Security scans (run in parallel) ──────────────
  tfsec:
    name: "tfsec"
    runs-on: ubuntu-latest
    needs: fmt-validate
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: .
          soft_fail: false

  checkov:
    name: "Checkov"
    runs-on: ubuntu-latest
    needs: fmt-validate
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: cli
          soft_fail: false

  trivy:
    name: "Trivy"
    runs-on: ubuntu-latest
    needs: fmt-validate
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy IaC scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 1
          severity: "CRITICAL,HIGH"

  # ── Stage 4: Secret detection ──────────────────────────────
  secrets:
    name: "Secret scanning"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 5: Terraform Plan (per environment) ──────────────
  plan:
    name: "Plan — ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    needs: [tflint, tfsec, checkov, trivy, secrets]
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        environment: [development, production]
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform init
        run: terraform init
        working-directory: gcp/${{ matrix.environment }}

      - name: Terraform plan
        id: plan
        run: |
          set -o pipefail
          terraform plan -input=false -no-color 2>&1 | tee plan.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        working-directory: gcp/${{ matrix.environment }}

      - name: Post plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('gcp/${{ matrix.environment }}/plan.txt', 'utf8');
            const plan = raw.length > 60000
              ? raw.substring(0, 60000) + '\n…truncated'
              : raw;

            const body = `### Terraform Plan — \`${{ matrix.environment }}\`
            <details><summary>Show output</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── Stage 6: Apply (production, merge-to-main only) ───────
  apply:
    name: "Apply — production"
    runs-on: ubuntu-latest
    needs: [tflint, tfsec, checkov, trivy, secrets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform init
        run: terraform init
        working-directory: gcp/production

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false -no-color
        working-directory: gcp/production

  # ── Gate: all checks must pass before merge ────────────────
  ci-gate:
    name: "CI Gate"
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [fmt-validate, tflint, tfsec, checkov, trivy, secrets, plan]
    steps:
      - name: Evaluate results
        run: |
          results='${{ toJson(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"failure"|"cancelled"'; then
            echo "::error::One or more required checks failed"
            exit 1
          fi
          echo "All checks passed"





